name: Upload Report to WeChat Cloud

on:
  push:
    paths:
      - 'reports/latest.json'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Upload to WeChat CloudBase
        run: |
          TOKEN_RESP=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${{ secrets.WECHAT_APPID }}&secret=${{ secrets.WECHAT_SECRET }}")
          ACCESS_TOKEN=$(echo $TOKEN_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          
          UPLOAD_RESP=$(curl -s -X POST \
            "https://api.weixin.qq.com/tcb/uploadfile?access_token=${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"env\":\"${{ secrets.CLOUDBASE_ENV }}\",\"path\":\"reports/latest.json\"}")
          
          UPLOAD_URL=$(echo $UPLOAD_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url',''))")
          TOKEN_VAL=$(echo $UPLOAD_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('token',''))")
          AUTH_VAL=$(echo $UPLOAD_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('authorization',''))")
          COS_FILE_ID=$(echo $UPLOAD_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('cos_file_id',''))")
          
          curl -s -X POST "${UPLOAD_URL}" \
            -F "key=reports/latest.json" \
            -F "Signature=${TOKEN_VAL}" \
            -F "x-cos-security-token=${AUTH_VAL}" \
            -F "x-cos-meta-fileid=${COS_FILE_ID}" \
            -F "file=@reports/latest.json;type=application/json"
          
          echo "✅ 上传完成"
