name: Upload Report to WeChat Cloud

on:
  push:
    paths:
      - 'reports/latest.json'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Upload to WeChat CloudBase Storage
        run: |
          TOKEN_RESP=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${{ secrets.WECHAT_APPID }}&secret=${{ secrets.WECHAT_SECRET }}")
          ACCESS_TOKEN=$(echo $TOKEN_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ 获取 access_token 失败: $TOKEN_RESP"
            exit 1
          fi
          echo "✅ access_token 获取成功"

          UPLOAD_RESP=$(curl -s -X POST \
            "https://api.weixin.qq.com/tcb/uploadfile?access_token=${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"env\":\"${{ secrets.CLOUDBASE_ENV }}\",\"path\":\"reports/latest.json\"}")

          UPLOAD_URL=$(echo $UPLOAD_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url',''))")
          TOKEN_VAL=$(echo $UPLOAD_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('token',''))")
          AUTH_VAL=$(echo $UPLOAD_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('authorization',''))")
          COS_FILE_ID=$(echo $UPLOAD_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('cos_file_id',''))")

          curl -s -X POST "${UPLOAD_URL}" \
            -F "key=reports/latest.json" \
            -F "Signature=${TOKEN_VAL}" \
            -F "x-cos-security-token=${AUTH_VAL}" \
            -F "x-cos-meta-fileid=${COS_FILE_ID}" \
            -F "file=@reports/latest.json;type=application/json"

          echo "✅ 云存储上传完成"

      - name: Invoke uploadReport Cloud Function
        run: |
          TOKEN_RESP=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${{ secrets.WECHAT_APPID }}&secret=${{ secrets.WECHAT_SECRET }}")
          ACCESS_TOKEN=$(echo $TOKEN_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ 获取 access_token 失败: $TOKEN_RESP"
            exit 1
          fi

          REPORT=$(cat reports/latest.json)

          INVOKE_RESP=$(curl -s -X POST \
            "https://api.weixin.qq.com/tcb/invokecloudfunction?access_token=${ACCESS_TOKEN}&env=${{ secrets.CLOUDBASE_ENV }}&name=uploadReport" \
            -H "Content-Type: application/json" \
            -d "{\"report\":${REPORT}}")

          echo "云函数响应: $INVOKE_RESP"

          ERRCODE=$(echo $INVOKE_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('errcode',0))" 2>/dev/null || echo "0")
          ERRMSG=$(echo $INVOKE_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('errmsg','ok'))" 2>/dev/null || echo "")

          if [ "$ERRCODE" != "0" ]; then
            echo "❌ 云函数调用失败，errcode=$ERRCODE errmsg=$ERRMSG"
            exit 1
          fi

          RESP_DATA=$(echo $INVOKE_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('resp_data',''))" 2>/dev/null || echo "")
          echo "云函数返回: $RESP_DATA"
          echo "✅ uploadReport 执行成功，数据已写入云数据库"